<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#111111"/>
<title>Feuille de route</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#111;--bg2:#1a1a1a;--bg3:#222;--text:#f5f5f5;--text2:#999;--border:#333;--blue:#60a5fa;--green:#4ade80;--suit-s:#6b9fd4;--suit-h:#d4706a;--suit-d:#c8924a;--suit-c:#6aaa78;}
@media(prefers-color-scheme:light){:root{--bg:#f8f8f7;--bg2:#fff;--bg3:#efefed;--text:#111;--text2:#666;--border:#ddd;--blue:#1d4ed8;--green:#166534;}}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding-bottom:env(safe-area-inset-bottom,20px);touch-action:manipulation;-webkit-user-select:none;user-select:none;}
.wrap{max-width:480px;margin:0 auto;padding:1.5rem 1rem;}
.screen{display:none;}.screen.active{display:block;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.section-title{font-size:15px;font-weight:600;margin-bottom:.3rem;}
.section-sub{font-size:12px;color:var(--text2);margin-bottom:.8rem;}
.back-btn{display:inline-flex;align-items:center;gap:4px;border:none;background:none;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;margin-bottom:1.1rem;padding:0;}
.field{margin-bottom:1.1rem;}
.field label{display:block;font-size:13px;color:var(--text2);margin-bottom:5px;font-weight:500;}
input[type=number]{width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg2);color:var(--text);font-size:16px;font-family:inherit;-webkit-appearance:none;outline:none;}
input[type=number]:focus{border-color:var(--blue);}
.seg{display:flex;gap:8px;}
.seg-btn{flex:1;padding:11px 8px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-family:inherit;}
.btn-go{width:100%;margin-top:1.2rem;padding:14px;border:none;border-radius:12px;background:var(--text);color:var(--bg);font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-go:active{opacity:.8;}
.err{font-size:12px;color:#f87171;margin-top:4px;display:none;}
.options-list{display:flex;flex-direction:column;gap:8px;}
.option-btn{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg2);color:var(--text);font-size:14px;font-family:inherit;cursor:pointer;text-align:left;transition:all 0.15s;display:flex;justify-content:space-between;align-items:center;min-height:64px;}
.option-btn:active{transform:scale(0.98);opacity:0.8;}
.option-main{font-weight:600;font-size:14px;}
.option-detail{font-size:12px;color:var(--text2);margin-top:2px;}
.option-badge{font-size:11px;padding:3px 8px;border-radius:999px;font-weight:600;flex-shrink:0;margin-left:8px;}
.badge-simple{background:#dbeafe;color:#1e3a8a;}
.badge-saut-opt{background:#fef3c7;color:#92400e;}
.badge-guerid-opt{background:#d1fae5;color:#065f46;}
.badge-howell{background:#f3e8ff;color:#6b21a8;}
.section-sep{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;padding:4px 2px 2px;}
.no-options{font-size:13px;color:var(--text2);padding:12px;background:var(--bg3);border-radius:10px;text-align:center;}
.donne-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;}
.donne-hdr{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);}
.donne-num{width:32px;height:32px;border-radius:8px;background:#1d4ed8;color:#bfdbfe;font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.donne-score{margin-left:auto;font-size:13px;font-weight:700;color:var(--green);}
.donne-score.neg{color:#f87171;}
.donne-body{padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.inp-lbl{font-size:11px;color:var(--text2);margin-bottom:3px;}
.btns4{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
.btns4 button{padding:7px 0;border-radius:7px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.btns4 button.active{background:rgba(96,165,250,.15);border-color:var(--blue);color:var(--blue);}
.tour-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.tour-badge{font-size:24px;font-weight:800;}
.tour-badge span{font-size:14px;font-weight:400;color:var(--text2);}
.tour-nav button{width:38px;height:38px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg2);color:var(--text);font-size:20px;cursor:pointer;margin-left:6px;}
.tour-nav button:disabled{opacity:.3;cursor:not-allowed;}
.tour-info{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.75rem;}
.tour-info span{font-size:12px;color:var(--text2);background:var(--bg3);padding:3px 9px;border-radius:999px;}
.relais-card{background:rgba(167,139,250,.1);border:1.5px solid rgba(167,139,250,.3);border-radius:12px;padding:12px 14px;color:#a78bfa;font-weight:600;font-size:13px;margin-bottom:8px;}
.recap-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.recap-row:last-child{border-bottom:none;}
.recap-num{width:28px;height:28px;border-radius:7px;background:#1d4ed8;color:#bfdbfe;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.recap-contract{font-size:13px;font-weight:500;flex:1;}
.recap-score{font-size:13px;font-weight:700;}
.recap-score.pos{color:var(--green);}
.recap-score.neg{color:#f87171;}
.total-box{background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-top:1rem;}
.suit-row{display:flex;gap:3px;margin-top:4px;}
.suit-btn{flex:1;padding:8px 0;border-radius:8px;border:1.5px solid var(--border);background:var(--bg3);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.suit-btn.active{background:rgba(96,165,250,.15);border-color:var(--blue);}
.res-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.res-btn{padding:6px 0;border-radius:6px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
.res-btn.active{background:rgba(96,165,250,.15);border-color:var(--blue);color:var(--blue);}
/* Picker */
.picker-row{display:flex;gap:6px;}
.picker-col{flex:1;display:flex;flex-direction:column;}
.picker-lbl{font-size:11px;color:var(--text2);text-align:center;margin-bottom:3px;}
.drum{height:150px;overflow:hidden;position:relative;border-radius:10px;background:var(--bg3);border:1.5px solid var(--border);cursor:grab;}
.drum:active{cursor:grabbing;}
.drum-fade-top,.drum-fade-bot{position:absolute;left:0;right:0;height:50px;z-index:2;pointer-events:none;}
.drum-fade-top{top:0;background:linear-gradient(to bottom,var(--bg3) 0%,transparent 100%);}
.drum-fade-bot{bottom:0;background:linear-gradient(to top,var(--bg3) 0%,transparent 100%);}
.drum-line{position:absolute;top:50%;left:8px;right:8px;height:38px;transform:translateY(-50%);border-top:1.5px solid var(--blue);border-bottom:1.5px solid var(--blue);border-radius:6px;z-index:1;pointer-events:none;}
.drum-inner{position:absolute;width:100%;will-change:transform;}
.drum-item{height:50px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:var(--text2);-webkit-user-select:none;user-select:none;transition:color 0.1s,font-size 0.1s;}
.drum-item.active{color:var(--text);font-size:20px;}
</style>
</head>
<body>
<div class="wrap">

<div class="screen active" id="s-paires">
  <p class="section-title">🃏 Feuille de route</p>
  <p class="section-sub">Nombre de paires</p>
  <div class="field">
    <input type="number" id="f-paires" min="6" max="36" step="1" inputmode="numeric"
      placeholder="ex: 12" onfocus="this.select()" oninput="onPairesInput()"/>
    <p class="err" id="e-paires">Entre 6 et 36 paires</p>
  </div>
  <div class="options-list" id="mouv-list"></div>
</div>

<div class="screen" id="s-position">
  <button class="back-btn" onclick="goScreen('s-paires')">← Retour</button>
  <p class="section-title" id="pos-title"></p>
  <p class="section-sub" id="pos-sub"></p>
  <div id="pos-mitchell">
    <div class="field">
      <label>Votre table</label>
      <input type="number" id="f-table" min="1" step="1" inputmode="numeric" onfocus="this.select()"/>
      <p class="err" id="e-table">Numéro invalide</p>
    </div>
    <div class="field">
      <label>Votre sens</label>
      <div class="seg">
        <button class="seg-btn" id="btn-ns" onclick="setSens('NS')">Nord / Sud</button>
        <button class="seg-btn" id="btn-eo" onclick="setSens('EO')">Est / Ouest</button>
      </div>
    </div>
    <div class="field" id="field-relais" style="display:none;">
      <label>Ligne du relais</label>
      <div class="seg">
        <button class="seg-btn" id="btn-rns" onclick="setRL('NS')">Nord / Sud</button>
        <button class="seg-btn" id="btn-reo" onclick="setRL('EO')">Est / Ouest</button>
      </div>
    </div>
  </div>
  <div id="pos-howell" style="display:none;">
    <div class="field">
      <label>Votre numéro de paire</label>
      <input type="number" id="f-paire" min="1" step="1" inputmode="numeric" onfocus="this.select()"/>
      <p class="err" id="e-paire">Numéro invalide</p>
    </div>
  </div>
  <button class="btn-go" onclick="startFeuille()">Commencer →</button>
</div>

<div class="screen" id="s-jeu">
  <div class="tour-hdr">
    <div class="tour-badge">Tour <span id="t-num">1</span><span> / <span id="t-total">?</span></span></div>
    <div class="tour-nav">
      <button id="btn-prev" onclick="navTour(-1)" disabled>‹</button>
      <button id="btn-next" onclick="navTour(1)">›</button>
    </div>
  </div>
  <div class="tour-info" id="t-info"></div>
  <div id="t-donnes"></div>
  <button class="btn-go" onclick="goScreen('s-recap');buildRecap();"
    style="background:var(--bg3);color:var(--text);margin-top:.5rem;font-size:14px;">
    Voir le récapitulatif →
  </button>
</div>

<div class="screen" id="s-recap">
  <button class="back-btn" onclick="goScreen('s-jeu')">← Retour</button>
  <p class="section-title">Récapitulatif</p>
  <p class="section-sub" id="recap-sub"></p>
  <div id="recap-list"></div>
  <div class="total-box">
    <span style="font-size:14px;color:var(--text2);">Score total</span>
    <span style="font-size:24px;font-weight:800;" id="recap-total">0</span>
  </div>
  <button class="btn-go" style="margin-top:1rem;background:var(--bg3);color:var(--text);font-size:13px;"
    onclick="if(confirm('Recommencer ?')){{goScreen('s-paires');results={};}}"
    >↩ Recommencer</button>
</div>

</div>

const HOWELL_KEY_MAP = {
  'classique_6_5':  'classique_6_5',
  'classique_8_4':  'classique_8_4',
  'classique_10_3': 'classique_10_3',
  'classique_12_3': 'classique_12_3',

  'heredia_12_3': 'heredia_12_3',
};

function howellDonnes(key, paire, tour) {
  const realKey = HOWELL_KEY_MAP[key] || key;
  const mv = HOWELL_MOVES[realKey];
  if(!mv) return null;
  if(mv.type==='classique') {
    // chercher dans les tables
    for(const table of mv.tables) {
      const t = table[tour];
      if(!t) continue;
      const [ns,eo,e] = t;
      if(ns===paire||eo===paire) return Array.from({length:e[1]-e[0]+1},(_,i)=>e[0]+i);
    }
    return null;
  } else {
    // heredia
    const pos = mv.paires[paire]?.[tour];
    if(!pos||pos.relais) return null;
    return Array.from({length:pos.e[1]-pos.e[0]+1},(_,i)=>pos.e[0]+i);
  }
}

// Clé Howell pour la config actuelle
function howellKey(mouvement, nbPaires, dpt) {
  return mouvement+'_'+nbPaires+'_'+dpt;
}

function buildSim(T,N,R,mode,sens){
  const withSaut=(mode==='saut')||(mode==='mitchell'&&N%2===0);
  const isGuerid=mode==='guerid';
  const sautApres=withSaut?N/2-1:-1;
  let blocs=Array.from({length:N},(_,i)=>i);
  let eoPos=T-1,eoTable=T;
  const tours=[];
  for(let t=0;t<R;t++){
    let tableAffichee,blocIdx,estSaut=false;
    if(isGuerid){
      const tRef=sens==='NS'?T:eoTable;
      const slot=tToSlot(tRef,N);
      blocIdx=blocs[slot];
      tableAffichee=(tRef===1||tRef===N)?'1 & '+N:String(tRef);
    }else{
      if(sens==='NS'){blocIdx=blocs[T-1];tableAffichee=String(T);}
      else{blocIdx=blocs[eoPos];tableAffichee=String(eoPos+1);estSaut=withSaut&&t===sautApres+1;}
    }
    tours.push({blocIdx,tableAffichee,estSaut});
    const nd=Array(N);
    if(isGuerid){for(let i=0;i<N;i++)nd[i]=blocs[(i+1)%N];}
    else{nd[N-1]=blocs[0];for(let i=0;i<N-1;i++)nd[i]=blocs[i+1];}
    blocs=nd;
    if(isGuerid)eoTable=(eoTable%N)+1;
    else{const pas=withSaut&&t===sautApres?2:1;eoPos=(eoPos+pas)%N;}
  }
  return tours;
}

function getGrouped(p, dbSource){
  const rows=dbSource.filter(r=>r[0]===p);
  const groups={};
  rows.forEach(row=>{
    const isHowell=dbSource===DB_HOWELL;
    const [,t,m,r,d,dc,def]=isHowell?row:[...row.slice(0,5),row[1]*row[4],row[6]];
    const key=m+'_'+d; // grouper par mouvement ET dpt
    if(!groups[key]) groups[key]={mouvement:m,tables:t,options:[],deficient:true};
    groups[key].options.push({tours:r,dpt:d,donnesCirc:dc,deficient:def});
    if(!def) groups[key].deficient=false;
  });
  return Object.values(groups);
}

function tToSlot(t,N){if(t===1||t===N)return 0;if(t<=N/2)return t-1;return t;}

// ── Drum picker ──────────────────────────────────────────────────────────
function makeDrum(id, items, initVal, onChange) {
  var el = document.createElement('div');
  el.className = 'drum';
  el.id = id;
  var inner = document.createElement('div');
  inner.className = 'drum-inner';
  // pad
  inner.innerHTML = '<div class="drum-item"></div>';
  items.forEach(function(it) {
    var div = document.createElement('div');
    div.className = 'drum-item';
    if(typeof it === 'object') { div.textContent = it.l; div.style.color = it.c; div.dataset.val = it.v; }
    else { div.textContent = it; div.dataset.val = it; }
    inner.appendChild(div);
  });
  inner.innerHTML += '<div class="drum-item"></div>';
  var line = document.createElement('div'); line.className = 'drum-line';
  var fadeT = document.createElement('div'); fadeT.className = 'drum-fade-top';
  var fadeB = document.createElement('div'); fadeB.className = 'drum-fade-bot';
  el.appendChild(fadeT); el.appendChild(line); el.appendChild(fadeB); el.appendChild(inner);

  var idx = 0;
  var vals = items.map(function(it){ return typeof it==='object'?it.v:it; });
  var found = vals.indexOf(String(initVal));
  if(found >= 0) idx = found;
  el._idx = idx; el._items = items; el._vals = vals; el._onChange = onChange;

  setDrumIdx(el, idx, false);
  addDrumEvents(el);
  return el;
}

function setDrumIdx(el, idx, animate) {
  var n = el._items.length;
  idx = Math.max(0, Math.min(n-1, idx));
  el._idx = idx;
  var inner = el.querySelector('.drum-inner');
  if(animate) inner.style.transition = 'transform 0.18s cubic-bezier(0.25,0.46,0.45,0.94)';
  else inner.style.transition = 'none';
  inner.style.transform = 'translateY(' + (75 - idx * ITEM_H) + 'px)';
  inner.querySelectorAll('.drum-item[data-val]').forEach(function(item, i) {
    item.classList.toggle('active', i === idx);
  });
  var val = el._vals[idx];
  if(el._onChange) el._onChange(val);
}

function addDrumEvents(el) {
  var startY=0, startIdx=0, lastY=0, lastT=0, vel=0, dragging=false, raf=null;
  function getY(e){ return e.touches ? e.touches[0].clientY : e.clientY; }
  function start(e) {
    if(raf){cancelAnimationFrame(raf);raf=null;}
    dragging=true; startY=getY(e); lastY=startY; lastT=Date.now(); startIdx=el._idx; vel=0;
    el.querySelector('.drum-inner').style.transition='none';
    e.preventDefault();
  }
  function move(e) {
    if(!dragging) return;
    var y=getY(e), now=Date.now(), dt=Math.max(1,now-lastT);
    vel = (lastY-y)/dt;
    lastY=y; lastT=now;
    var fi = startIdx + (startY-y)/ITEM_H;
    fi = Math.max(-0.4, Math.min(el._items.length-0.6, fi));
    el.querySelector('.drum-inner').style.transform = 'translateY(' + (75 - fi*ITEM_H) + 'px)';
    var si = Math.round(fi);
    if(si !== el._idx) {
      el._idx = si;
      el.querySelector('.drum-inner').querySelectorAll('.drum-item[data-val]').forEach(function(item,i){item.classList.toggle('active',i===si);});
    }
    e.preventDefault();
  }
  function end() {
    if(!dragging) return;
    dragging=false;
    var v=vel, fi=el._idx;
    function animate(){
      v *= 0.88;
      fi += v * 16/ITEM_H;
      var ci = Math.max(0, Math.min(el._items.length-1, fi));
      el.querySelector('.drum-inner').style.transition='none';
      el.querySelector('.drum-inner').style.transform = 'translateY(' + (75 - ci*ITEM_H) + 'px)';
      var si = Math.round(ci);
      if(si !== el._idx){
        el._idx=si;
        el.querySelector('.drum-inner').querySelectorAll('.drum-item[data-val]').forEach(function(item,i){item.classList.toggle('active',i===si);});
        if(el._onChange) el._onChange(el._vals[si]);
      }
      if(Math.abs(v)>0.015 && ci>0 && ci<el._items.length-1) raf=requestAnimationFrame(animate);
      else setDrumIdx(el, Math.round(ci), true);
    }
    raf=requestAnimationFrame(animate);
  }
  el.addEventListener('touchstart',start,{passive:false});
  el.addEventListener('touchmove',move,{passive:false});
  el.addEventListener('touchend',end);
  el.addEventListener('mousedown',start);
  el.addEventListener('mousemove',function(e){if(dragging)move(e);});
  el.addEventListener('mouseup',end);
  el.addEventListener('mouseleave',function(){if(dragging)end();});
  el.addEventListener('wheel',function(e){
    e.preventDefault();
    if(raf){cancelAnimationFrame(raf);raf=null;}
    setDrumIdx(el,el._idx+(e.deltaY>0?1:-1),true);
  },{passive:false});
}

// ── Render tour ──────────────────────────────────────────────────────────
function renderTour(){
  var t=tourIdx;
  document.getElementById('t-num').textContent=t+1;
  document.getElementById('t-total').textContent=cfg.R;
  document.getElementById('btn-prev').disabled=t===0;
  document.getElementById('btn-next').disabled=t===cfg.R-1;
  var info='';
  if(!cfg.isH){var e=sim[t];info='<span>Table '+e.tableAffichee+'</span><span>'+(cfg.sens==='NS'?'Nord/Sud':'Est/Ouest')+'</span>'+(e.estSaut?'<span style="color:#fbbf24">↪ Saut</span>':'');}
  else info='<span>Paire '+cfg.P+'</span><span>'+(cfg.htype==='classique'?'Classique':'Hérédia')+'</span>';
  document.getElementById('t-info').innerHTML=info;
  var donnes=getDonnes(t),container=document.getElementById('t-donnes');
  if(donnes===null){container.innerHTML='<div class="relais-card">⏸ Relais — pas de jeu ce tour</div>';return;}
  var isMobile=window.innerWidth<=600;
  container.innerHTML='';
  donnes.forEach(function(d){
    var r=results[d]||{res:'='};
    var sc=r.score;
    var sh=sc!==undefined?'<span class="donne-score'+(sc<0?' neg':'')+'">'+( sc>0?'+':'')+sc+'</span>':'';
    var card=document.createElement('div');card.className='donne-card';card.id='c'+d;
    var body='<div class="donne-body">';
    if(isMobile){
      body+='<div class="picker-row">'+
        '<div class="picker-col"><div class="drum-lbl inp-lbl" style="text-align:center;margin-bottom:3px;">Niv.</div><div id="drum-lv-'+d+'"></div></div>'+
        '<div class="picker-col"><div class="drum-lbl inp-lbl" style="text-align:center;margin-bottom:3px;">Couleur</div><div id="drum-col-'+d+'"></div></div>'+
        '<div class="picker-col"><div class="drum-lbl inp-lbl" style="text-align:center;margin-bottom:3px;">Résultat</div><div id="drum-res-'+d+'"></div></div>'+
      '</div>';
    } else {
      var suitBtns=SUITS.map(function(p){var c=p[0],sym=p[1],clr=p[2];return '<button class="suit-btn'+((r.col||'')===c?' active':'')+'" data-d="'+d+'" data-col="'+c+'" onclick="setColBtn(this)" style="color:'+clr+'">'+sym+'</button>';}).join('');
      var resBtns=RES_VALS.map(function(x){return '<button class="res-btn'+((r.res||'=')===x?' active':'')+'" data-d="'+d+'" data-res="'+x+'" onclick="setResBtn(this)">'+x+'</button>';}).join('');
      body+='<div style="display:flex;gap:8px;align-items:flex-end;margin-bottom:4px;">'+
        '<div><div class="inp-lbl">Niveau</div><input type="number" min="1" max="7" value="'+(r.lv||'')+'" placeholder="1-7" data-d="'+d+'" oninput="setLvBtn(this)" onfocus="this.select()" style="width:60px;padding:8px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text);font-size:18px;font-weight:800;text-align:center;outline:none;-webkit-user-select:text;user-select:text;"/></div>'+
        '<div style="flex:1"><div class="inp-lbl">Couleur</div><div class="suit-row" id="suit-'+d+'">'+suitBtns+'</div></div></div>'+
        '<div><div class="inp-lbl">Résultat</div><div class="res-grid" style="margin-top:3px;" id="res-'+d+'">'+resBtns+'</div></div>';
    }
    body+='<div class="row3" style="margin-top:6px;">'+
      '<div><div class="inp-lbl">Déclarant</div><div class="btns4" id="decl-'+d+'">'+mkDeclBtns(d,r)+'</div></div>'+
      '<div><div class="inp-lbl">Contre</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;" id="dbl-'+d+'">'+mkDblBtns(d,r)+'</div></div>'+
      '<div><div class="inp-lbl">Score</div><div id="sc-'+d+'" style="font-size:20px;font-weight:800;color:'+(sc!==undefined?(sc<0?'#f87171':'var(--green)'):'var(--text2)')+';">'+(sc!==undefined?(sc>0?'+':'')+sc:'—')+'</div></div>'+
    '</div></div>';
    card.innerHTML='<div class="donne-hdr"><div class="donne-num">'+d+'</div><div style="font-size:13px;font-weight:600">Donne '+d+'</div>'+sh+'</div>'+body;
    container.appendChild(card);
    if(isMobile){
      var lvDrum=makeDrum('drum-lv-'+d,LV_ITEMS,r.lv?String(r.lv):'-',function(v){onDrum(d,'lv',v);});
      var colDrum=makeDrum('drum-col-'+d,COL_ITEMS,r.col||'T',function(v){onDrum(d,'col',v);});
      var resDrum=makeDrum('drum-res-'+d,RES_ITEMS,r.res||'=',function(v){onDrum(d,'res',v);});
      document.getElementById('drum-lv-'+d).appendChild(lvDrum);
      document.getElementById('drum-col-'+d).appendChild(colDrum);
      document.getElementById('drum-res-'+d).appendChild(resDrum);
    }
  });
}

function navTour(d){tourIdx+=d;renderTour();window.scrollTo(0,0);}

function onDrum(d,type,val){
  if(!results[d])results[d]={res:'='};
  if(type==='lv'){var lv=parseInt(val);results[d].lv=(lv>=1&&lv<=7)?lv:'';}
  else if(type==='col')results[d].col=val;
  else results[d].res=val;
  results[d].contrat=(results[d].lv&&results[d].col)?results[d].lv+results[d].col:'';
  calc(d);updScore(d);
}

function mkDeclBtns(d,r){return ['N','S','E','O'].map(function(x){return '<button class="'+((r.dec||'')===x?'active':'')+'" data-d="'+d+'" data-val="'+x+'" onclick="setDecBtn(this)">'+x+'</button>';}).join('');}
function mkDblBtns(d,r){return [['x','X'],['xx','XX']].map(function(p){var v=p[0],l=p[1],sel=(r.dbl||'')===v;return '<button data-d="'+d+'" data-dbl="'+v+'" onclick="togDblBtn(this)" style="padding:7px 0;border-radius:7px;border:1.5px solid '+(sel?'var(--blue)':'var(--border)')+';background:'+(sel?'rgba(96,165,250,.15)':'var(--bg3)')+';color:'+(sel?'var(--blue)':'var(--text2)')+';font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">'+l+'</button>';}).join('');}
function setColBtn(btn){setCol(parseInt(btn.dataset.d),btn.dataset.col);}
function setResBtn(btn){setRes(parseInt(btn.dataset.d),btn.dataset.res);}
function setDecBtn(btn){setDec(parseInt(btn.dataset.d),btn.dataset.val);}
function togDblBtn(btn){togDbl(parseInt(btn.dataset.d),btn.dataset.dbl);}
function setLvBtn(inp){setLv(parseInt(inp.dataset.d),inp.value);}
function setLv(d,v){if(!results[d])results[d]={res:'='};var lv=parseInt(v);results[d].lv=(lv>=1&&lv<=7)?lv:'';results[d].contrat=results[d].lv&&results[d].col?results[d].lv+results[d].col:'';calc(d);updScore(d);}
function setCol(d,c){if(!results[d])results[d]={res:'='};results[d].col=c;results[d].contrat=results[d].lv&&c?results[d].lv+c:'';var row=document.getElementById('suit-'+d);if(row)row.querySelectorAll('.suit-btn').forEach(function(b){b.className='suit-btn'+(b.dataset.col===c?' active':'');});calc(d);updScore(d);}
function setRes(d,x){if(!results[d])results[d]={res:'='};results[d].res=x;var row=document.getElementById('res-'+d);if(row)row.querySelectorAll('.res-btn').forEach(function(b){b.className='res-btn'+(b.dataset.res===x?' active':'');});calc(d);updScore(d);}
function setDec(d,x){if(!results[d])results[d]={res:'='};results[d].dec=x;var row=document.getElementById('decl-'+d);if(row)row.querySelectorAll('button').forEach(function(b){b.className=(b.dataset.val===x?'active':'');});calc(d);updScore(d);}
function togDbl(d,v){if(!results[d])results[d]={res:'='};results[d].dbl=results[d].dbl===v?'':v;var row=document.getElementById('dbl-'+d);if(row)row.querySelectorAll('button').forEach(function(b){var sel=results[d].dbl===b.dataset.dbl;b.style.borderColor=sel?'var(--blue)':'var(--border)';b.style.background=sel?'rgba(96,165,250,.15)':'var(--bg3)';b.style.color=sel?'var(--blue)':'var(--text2)';});calc(d);updScore(d);}

function isVul(b,dec){var n=((b-1)%16)+1,ns=['N','S'].includes((dec||'').toUpperCase());if([5,6,9,10,13,14].includes(n))return true;if(ns&&[1,2].includes(n))return true;if(!ns&&[3,4,7,8,11,12,15,16].includes(n))return true;return false;}
function calc(d){
  var r=results[d];if(!r||!r.contrat||!r.dec||!r.res){if(r)r.score=undefined;return;}
  var m=r.contrat.match(/^([1-7])(SA|[PKTC])$/i);if(!m){r.score=undefined;return;}
  var lv=parseInt(m[1]),suit=m[2].toUpperCase(),isSA=suit==='SA',isMaj=['P','C'].includes(suit);
  var res=r.res==='='?0:parseInt(r.res);if(isNaN(res)){r.score=undefined;return;}
  var vul=isVul(d,r.dec),dbl=r.dbl||'';
  if(res<0){var n=-res;r.score=!dbl?(vul?-100*n:-50*n):dbl==='x'?(vul?(n===1?-200:n===2?-500:-800-(n-3)*300):(n===1?-100:n===2?-300:-500-(n-3)*300)):(vul?(n===1?-400:n===2?-1000:-1600-(n-3)*600):(n===1?-200:n===2?-600:-1000-(n-3)*600));}
  else{var pts=!dbl?(isSA?40+(lv-1)*30+res*30:isMaj?lv*30+res*30:lv*20+res*20):dbl==='x'?(isSA?(40+(lv-1)*30)*2+res*100:isMaj?lv*60+res*100:lv*40+res*100):(isSA?(40+(lv-1)*30)*4+res*200:isMaj?lv*120+res*200:lv*80+res*200);var base=isSA?40+(lv-1)*30:isMaj?lv*30:lv*20,bd=dbl==='x'?base*2:dbl==='xx'?base*4:base,prime=bd>=100?(vul?500:300):50;if(dbl==='x')prime+=50;if(dbl==='xx')prime+=100;var tot=lv+6+res;if(tot===13)prime+=vul?1500:1000;else if(tot===12)prime+=vul?750:500;r.score=pts+prime;}
}
function updScore(d){var r=results[d],sc=r&&r.score;var el=document.getElementById('sc-'+d);if(el){el.textContent=sc!==undefined?(sc>0?'+':'')+sc:'—';el.style.color=sc!==undefined?(sc<0?'#f87171':'var(--green)'):'var(--text2)';}var hdr=document.getElementById('c'+d);if(!hdr)return;var sh=hdr.querySelector('.donne-score');if(sc!==undefined){if(!sh){sh=document.createElement('span');hdr.querySelector('.donne-hdr').appendChild(sh);}sh.textContent=(sc>0?'+':'')+sc;sh.className='donne-score'+(sc<0?' neg':'');}else if(sh)sh.remove();}
function buildRecap(){
  var all=[];for(var t=0;t<cfg.R;t++){var d=getDonnes(t);if(d)all=all.concat(d);}
  var total=all.reduce(function(s,d){return s+(results[d]&&results[d].score!==undefined?results[d].score:0);},0);
  var played=all.filter(function(d){return results[d]&&results[d].score!==undefined;}).length;
  document.getElementById('recap-sub').textContent=played+' donne'+(played>1?'s':'')+' saisie'+(played>1?'s':'');
  document.getElementById('recap-list').innerHTML=all.map(function(d){var r=results[d],ct=r&&r.contrat?r.contrat+(r.dec?' par '+r.dec:'')+(r.dbl||'')+(r.res||''):'—',sc=r&&r.score;return '<div class="recap-row"><div class="recap-num">'+d+'</div><div class="recap-contract">'+ct+'</div><div class="recap-score'+(sc!==undefined?(sc<0?' neg':' pos'):'')+'">'+(sc!==undefined?(sc>0?'+':'')+sc:'—')+'</div></div>';}).join('');
  var el=document.getElementById('recap-total');el.textContent=(total>0?'+':'')+total;el.style.color=total>0?'var(--green)':total<0?'#f87171':'var(--text)';
}

setSens('NS');setRL('EO');
</script>
